<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Job Application Tracker</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        geist: ['Geist', 'sans-serif'],
                    }
                }
            }
        }
    </script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Geist:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Geist', sans-serif; }
    </style>
    
</head>
<body">
  <div>
     <header class="bg-white border-b border-gray-200 py-5">
            <div class="max-w-3xl mx-auto px-5">
                <h1 class="text-2xl font-bold text-indigo-500">Job Application Tracker</h1>
            </div>
        </header>
        <main class="max-w-3xl mx-auto px-5 pt-8 pb-16">
            <section class="mb-10" id="dashboard">
                <div class="grid grid-cols-1 sm:grid-cols-3 gap-4">
                    <div class="bg-white border border-gray-200 rounded-lg p-4 border-b-[3px] border-b-indigo-500">
                        <span class="block text-sm font-medium text-gray-600">Total</span>
                        <span class="block text-3xl font-bold text-indigo-500 mt-1" id="totalCount">8</span>
                    </div>
                    <div class="bg-white border border-gray-200 rounded-lg p-4 border-b-[3px] border-b-green-500">
                        <span class="block text-sm font-medium text-gray-600">Interview</span>
                        <span class="block text-3xl font-bold text-green-500 mt-1" id="interviewCount">0</span>
                    </div>
                    <div class="bg-white border border-gray-200 rounded-lg p-4 border-b-[3px] border-b-red-500">
                        <span class="block text-sm font-medium text-gray-600">Rejected</span>
                        <span class="block text-3xl font-bold text-red-500 mt-1" id="rejectedCount">0</span>
                    </div>
                </div>
            </section>
                        <section id="jobsSection">
                <div class="flex items-center justify-between flex-wrap gap-2">
                    <h2 class="text-xl font-bold text-gray-900">Available Jobs</h2>
                    <span class="text-sm font-medium text-gray-500" id="jobsCount">8 Jobs</span>
                </div>
                <div class="flex gap-2 mt-4 mb-6">
                    <button class="tab-btn active px-4 py-1.5 rounded-md text-xs font-semibold border border-gray-200 bg-white text-gray-600 transition hover:border-indigo-500 hover:text-indigo-500" data-tab="all">All</button>
                    <button class="tab-btn px-4 py-1.5 rounded-md text-xs font-semibold border border-gray-200 bg-white text-gray-600 transition hover:border-indigo-500 hover:text-indigo-500" data-tab="interview">Interview</button>
                    <button class="tab-btn px-4 py-1.5 rounded-md text-xs font-semibold border border-gray-200 bg-white text-gray-600 transition hover:border-indigo-500 hover:text-indigo-500" data-tab="rejected">Rejected</button>
                </div>
                <div class="flex flex-col gap-4" id="jobsList">
                </div>
                <div class="hidden flex-col items-center justify-center py-16 px-5 text-center bg-white border border-gray-200 rounded-lg" id="emptyState">

                    <img src="./jobs.png" alt="No jobs" class="w-20 h-auto">
                    <h3 class="text-lg font-semibold text-gray-600 mt-4">No jobs available</h3>
                    <p class="text-sm text-gray-400 mt-1 max-w-xs">Check back soon for new job opportunities</p>
                </div>
            </section>

        </main>
    </div>
    <script src="./js/data.js"></script>
    <script src="./js/ui.js"></script>
    <script src="./js/events.js"></script>


</body>
</html>
